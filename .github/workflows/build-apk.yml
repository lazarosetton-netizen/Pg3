name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Instalar dependências
        run: npm install

      - name: Instalar Capacitor
        run: npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest

      - name: Build do projeto React
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: npm run build

      - name: Remover pasta android
        run: rm -rf android

      - name: Adicionar plataforma Android
        run: npx cap add android

      - name: Sincronizar Capacitor com Android
        run: npx cap sync android

      - name: Corrigir conflito Kotlin no build.gradle
        run: |
          cat >> android/app/build.gradle << 'EOF'

          configurations.all {
            resolutionStrategy {
              force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0'
              force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0'
              force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0'
            }
          }
          EOF

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Tornar gradlew executável
        run: chmod +x android/gradlew

      - name: Build APK (debug)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PGNEWS-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
