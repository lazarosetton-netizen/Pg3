name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Instalar dependências
        run: npm install

      - name: Instalar Capacitor
        run: npm install @capacitor/core@latest @capacitor/cli@latest @capacitor/android@latest

      - name: Criar arquivo .env com as chaves
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env

      - name: Build do projeto React
        run: npm run build

      - name: Remover pasta android
        run: rm -rf android

      - name: Adicionar plataforma Android
        run: npx cap add android

      - name: Sincronizar Capacitor com Android
        run: npx cap sync android

      - name: Gerar ícones do app
        run: |
          pip install Pillow -q
          python3 -c "
from PIL import Image
import os
img = Image.open('public/icon.png').convert('RGBA')
sizes = {
  'android/app/src/main/res/mipmap-mdpi/ic_launcher.png': 48,
  'android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png': 48,
  'android/app/src/main/res/mipmap-hdpi/ic_launcher.png': 72,
  'android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png': 72,
  'android/app/src/main/res/mipmap-xhdpi/ic_launcher.png': 96,
  'android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png': 96,
  'android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png': 144,
  'android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png': 144,
  'android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png': 192,
  'android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png': 192,
}
[img.resize((s,s), Image.LANCZOS).save(p) for p,s in sizes.items()]
print('Icones gerados!')
"

      - name: Corrigir conflito Kotlin no build.gradle
        run: |
          cat >> android/app/build.gradle << 'EOF'

          configurations.all {
            resolutionStrategy {
              force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0'
              force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.0'
              force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.0'
            }
          }
          EOF

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Tornar gradlew executável
        run: chmod +x android/gradlew

      - name: Build APK (debug)
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PGNEWS-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
