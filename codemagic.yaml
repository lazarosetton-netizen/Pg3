workflows:
  android-apk:
    name: PGNEWS APK Build
    max_build_duration: 60

    environment:
      vars:
        GEMINI_API_KEY: AIzaSyCiSCxWFkWjWc62G1yCKzLvaSLDqBaT26o

    scripts:
      - name: Set environment variables
        script: |
          echo "GEMINI_API_KEY=AIzaSyCiSCxWFkWjWc62G1yCKzLvaSLDqBaT26o" > .env.local

      - name: Install dependencies
        script: npm install --force

      - name: Build Web Project
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync android

      - name: Set Gradle permissions
        script: chmod +x android/gradlew

      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleDebug

    artifacts:
      - android/app/build/outputs/apk/debug/*.apk

    publishing:
      email:
        recipients:
          - lazarosetton@gmail.com
        notify:
          success: true
          failure: true
