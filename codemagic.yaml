workflows:
  android-apk:
    name: PGNEWS APK Build
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      groups:
        - google_credentials
      vars:
        NODE_VERSION: 18.x
        GEMINI_API_KEY: "AIzaSyCFlkjLQ9M4WoK-qVKQ_P8VPs1iy7kWce0"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Web Project
        script: npm run build
      - name: Initialize Capacitor Android
        script: |
          npx cap add android
          npx cap copy android
      - name: Configure Android Permissions
        script: |
          # Adiciona permissão de internet se não existir
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "android.permission.INTERNET" "$MANIFEST"; then
            sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
          fi
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - SEU_EMAIL_AQUI@GMAIL.COM
