workflows:
  android-apk:
    name: PGNEWS APK Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      groups:
        - google_credentials # Onde vamos colocar sua GEMINI_API_KEY depois
      vars:
        NODE_VERSION: 18.x
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Web Project
        script: npm run build
      - name: Add Android Platform
        script: npx cap add android
      - name: Sync Capacitor
        script: npx cap sync
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/**/*.apk
    publishing:
      email:
        recipients:
          - SEU_EMAIL_AQUI@GMAIL.COM # Coloque seu e-mail aqui
