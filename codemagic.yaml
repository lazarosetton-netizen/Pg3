workflows:
  android-apk:
    name: PGNEWS APK Build
    max_build_duration: 30
    instance_type: linux
    environment:
      groups:
        - google_credentials
      vars:
        NODE_VERSION: 18.x
        GEMINI_API_KEY: "AIzaSyCFlkjLQ9M4WoK-qVKQ_P8VPs1iy7kWce0"
    scripts:
      - name: Install dependencies
        script: |
          npm install --force
      - name: Build Web Project
        script: |
          npm run build
      - name: Initialize Capacitor Android
        script: |
          npx cap add android || true
          npx cap copy android
      - name: Configure Android Permissions
        script: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
          fi
      - name: Build Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - lazarosetton@gmail.com
