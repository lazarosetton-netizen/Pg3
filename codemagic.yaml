workflows:
  android-apk:
    name: PGNEWS APK Build
    max_build_duration: 30
    instance_type: linux_x2
    environment:
      groups:
        - google_credentials
      vars:
        NODE_VERSION: 18.x
        GEMINI_API_KEY: "AIzaSyCFlkjLQ9M4WoK-qVKQ_P8VPs1iy7kWce0"
    scripts:
      - name: Install dependencies
        script: |
          # Limpa o cache e força a instalação de todas as bibliotecas do projeto
          npm install --force
      - name: Build Web Project
        script: |
          # Compila o React/Vite para a pasta dist
          npm run build
      - name: Initialize Capacitor Android
        script: |
          # Adiciona a plataforma Android e copia os arquivos do build
          npx cap add android
          npx cap copy android
      - name: Configure Android Permissions
        script: |
          # Garante que o APK tenha acesso à internet para ler as notícias
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET" />' "$MANIFEST"
          fi
      - name: Build Android APK
        script: |
          # Entra na pasta android, dá permissão ao gradlew e gera o APK
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - SEU_EMAIL_AQUI@GMAIL.COM # Troque pelo seu e-mail real
