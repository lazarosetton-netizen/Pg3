workflows:
  android-apk:
    name: PGNEWS APK Build
    max_build_duration: 30
    instance_type: mac_mini_m1
    environment:
      groups:
        - google_credentials
      vars:
        NODE_VERSION: 18.x
        GEMINI_API_KEY: "AIzaSyCFlkjLQ9M4WoK-qVKQ_P8VPs1iy7kWce0"
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Build Web Project
        script: npm run build
      - name: Add Android Platform
        script: npx cap add android
      - name: Sync Capacitor
        script: npx cap sync
      - name: Configure Android Permissions
        script: |
          # Garante que a permissão de internet esteja no manifesto
          sed -i '/<application/i <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
      - name: Build Android APK
        script: |
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    publishing:
      email:
        recipients:
          - SEU_EMAIL_AQUI@GMAIL.COM
